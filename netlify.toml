[build]
  # No --remote flag: Astro Studio is shut down. Runtime uses ASTRO_DB_REMOTE_URL (Turso) automatically.
  command = "astro build"
  publish = "dist"

[build.environment]
  NODE_VERSION       = "22"
  # Placeholder SQLite path so the build step passes its database check.
  # At runtime, ASTRO_DB_REMOTE_URL (set in Netlify env vars) takes precedence.
  ASTRO_DATABASE_FILE = "/tmp/astro-build.db"
